# Configuration for the FIPE.

[divisions]
    open = {name = "Open",min=0,max=999}
    senior = {name = "Senior",min=0,max=999}

    # New-style, no plurals. This is what the IPF uses.
    subjunior = {name = "Sub-Junior",min=14,max=17.5}
    junior = {name = "Junior",min=18.5,max=22.5}
    master1 = {name = "Master I",min=39.5,max=48.5}
    master2 = {name = "Master II",min=49.5,max=58.5}
    master3 = {name = "Master III",min=59.5,max=68.5}
    master4 = {name = "Master IV",min=69.5,max=999}

[weightclasses.default_M]
    classes = ["59","66","74","83","93","105","120","120+"]
    date_range=["0000-01-01","9999-01-01"]
    sex = "M"

[weightclasses.default_F]
    classes = ["47","52","57","63","69","76","84","84+"]
    date_range=["0000-01-01","9999-01-01"]
    sex = "F"

[weightclasses.junior_M]
    classes = ["53","59","66","74","83","93","105","120","120+"]
    date_range=["0000-01-01","9999-01-01"]
    sex = "M"
    divisions = ["Junior","Sub-Junior"]

[weightclasses.junior_F]
    classes = ["43","47","52","57","63","69","76","84","84+"]
    date_range=["0000-01-01","9999-01-01"]
    sex = "F"
    divisions = ["Junior","Sub-Junior"]

